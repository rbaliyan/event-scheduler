name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race ./...

      - name: Coverage gate (hermetic)
        run: |
          pkgs=$(go list ./... | grep -vE '/proto/|/examples' | paste -sd, -)
          go test -coverpkg="$pkgs" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -1
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          awk -v p="$pct" 'BEGIN{ if (p+0 < 55){ printf "hermetic coverage %.1f%% below 55%%\n", p; exit 1 } printf "hermetic coverage %.1f%% OK\n", p }'

  smoke:
    name: Smoke (hermetic, fast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Smoke tests
        run: go test -run 'TestSmoke|TestRedisLifecycle|TestMetrics|TestMongoCodec|TestPostgresSqlmock' ./...

  fuzz:
    name: Fuzz (seeds + short run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Fuzz seed corpora
        run: go test -run 'Fuzz' ./...

      - name: Short fuzz run (root)
        run: |
          for fz in FuzzMessageJSONRoundTrip FuzzValidateRecurrence FuzzComputeNextSchedule FuzzDecodeRecurrence FuzzMongoCodecRoundTrip FuzzHandleDeliveryFailure; do
            go test -run '^$' -fuzz "^$fz\$" -fuzztime=15s .
          done

      - name: Short fuzz run (service)
        run: |
          for fz in FuzzMessageToProto FuzzProtoToFilter; do
            go test -run '^$' -fuzz "^$fz\$" -fuzztime=15s ./service
          done

  bench:
    name: Benchmarks (compile + smoke run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks (1x, with allocs)
        run: go test -run '^$' -bench=. -benchmem -benchtime=1x ./...

  bench-regression:
    name: Benchmark regression (benchstat)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Benchmark base and PR
        run: |
          # Pure-logic + miniredis benches are deterministic enough for benchstat.
          BENCH='BenchmarkComputeNextSchedule|BenchmarkHandleDeliveryFailure|BenchmarkValidateRecurrence|BenchmarkEncodeDecodeRecurrence|BenchmarkAdaptivePollAdjust|BenchmarkPublishScheduledMessage|BenchmarkRedis'
          go test -run '^$' -bench "$BENCH" -benchmem -count=6 . | tee pr.txt
          git stash --include-untracked || true
          git checkout --quiet "$BASE_SHA"
          go test -run '^$' -bench "$BENCH" -benchmem -count=6 . | tee base.txt || echo "base benchmarks unavailable"
          git checkout --quiet -
          git stash pop || true

      - name: Compare with benchstat (fail on >2x regression)
        run: |
          if [ ! -s base.txt ]; then
            echo "No comparable base benchmarks; skipping regression diff."
            exit 0
          fi
          benchstat base.txt pr.txt | tee benchstat.txt
          # Fail if any sec/op delta exceeds +100% (2x). benchstat prints a
          # percentage delta column like "+5.00%" / "~"; flag any "+NNN%" >= 100.
          if grep -oE '\+[0-9]+(\.[0-9]+)?%' benchstat.txt | tr -d '+%' | awk '$1 >= 100 { found=1 } END { exit !found }'; then
            echo "::error::Benchmark regression >= 2x detected"
            exit 1
          fi
          echo "No >=2x regression detected."

  integration:
    name: Integration (Redis, PostgreSQL, MongoDB)
    runs-on: ubuntu-latest
    needs: [smoke]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduler_test
          POSTGRES_PASSWORD: scheduler_test
          POSTGRES_DB: scheduler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduler_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1})'"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          REDIS_ADDR: localhost:6379
          MONGO_URI: mongodb://localhost:27017
          POSTGRES_DSN: postgres://scheduler_test:scheduler_test@localhost:5432/scheduler_test?sslmode=disable
        run: go test -tags=integration -race -v ./...

      - name: Coverage gate (full, with backends)
        env:
          REDIS_ADDR: localhost:6379
          MONGO_URI: mongodb://localhost:27017
          POSTGRES_DSN: postgres://scheduler_test:scheduler_test@localhost:5432/scheduler_test?sslmode=disable
        run: |
          pkgs=$(go list ./... | grep -vE '/proto/|/examples' | paste -sd, -)
          go test -tags=integration -coverpkg="$pkgs" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -1
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          awk -v p="$pct" 'BEGIN{ if (p+0 < 80){ printf "full coverage %.1f%% below 80%%\n", p; exit 1 } printf "full coverage %.1f%% OK\n", p }'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.4
          args: --tests=false

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          category: "/language:go"
