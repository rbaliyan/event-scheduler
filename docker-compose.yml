# Local backends for integration tests.
#   docker compose up -d   # start
#   just test-integration  # run the tagged suite against them
#   docker compose down     # stop
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler_test
      POSTGRES_PASSWORD: scheduler_test
      POSTGRES_DB: scheduler_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
